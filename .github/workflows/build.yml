name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  SINGBOX_VERSION: "1.12.12"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            platform: macos-arm64
            singbox_url: https://github.com/SagerNet/sing-box/releases/download/v1.12.12/sing-box-1.12.12-darwin-arm64.tar.gz
          - os: windows-latest
            platform: windows-x64
            singbox_url: https://github.com/SagerNet/sing-box/releases/download/v1.12.12/sing-box-1.12.12-windows-amd64.zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install PySide6 requests pyinstaller

      - name: Download sing-box (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p resources
          curl -L "${{ matrix.singbox_url }}" -o singbox.tar.gz
          tar xzf singbox.tar.gz
          cp sing-box-*/sing-box resources/sing-box
          chmod +x resources/sing-box

      - name: Download sing-box (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path resources
          Invoke-WebRequest -Uri "${{ matrix.singbox_url }}" -OutFile singbox.zip
          Expand-Archive -Path singbox.zip -DestinationPath singbox-extract
          Copy-Item "singbox-extract\sing-box-*\sing-box.exe" "resources\sing-box.exe"

      - name: Build with PyInstaller
        run: pyinstaller singbox-client.spec --noconfirm

      - name: Create DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install create-dmg
          create-dmg \
            --volname "SingBox Client" \
            --volicon "resources/icon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "SingBox Client.app" 150 190 \
            --app-drop-link 450 190 \
            --no-internet-enable \
            "SingBox-Client-${{ matrix.platform }}.dmg" \
            "dist/SingBox Client.app" \
          || \
          create-dmg \
            --volname "SingBox Client" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "SingBox Client.app" 150 190 \
            --app-drop-link 450 190 \
            --no-internet-enable \
            "SingBox-Client-${{ matrix.platform }}.dmg" \
            "dist/SingBox Client.app"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\SingBox Client.exe" -DestinationPath "SingBox-Client-${{ matrix.platform }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SingBox-Client-${{ matrix.platform }}
          path: |
            SingBox-Client-${{ matrix.platform }}.dmg
            SingBox-Client-${{ matrix.platform }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SingBox Client ${{ github.ref_name }}
          body: |
            ## SingBox Client ${{ github.ref_name }}

            ### 下载
            - **macOS (Apple Silicon)**: `SingBox-Client-macos-arm64.dmg`
            - **Windows (x64)**: `SingBox-Client-windows-x64.zip`

            ### macOS 安装说明
            1. 打开 DMG，将 SingBox Client 拖到 Applications
            2. 首次打开前执行：`xattr -cr /Applications/SingBox\ Client.app`
            3. 双击打开

            ### Windows 安装说明
            1. 解压 zip
            2. 运行 `SingBox Client.exe`

            ---
            内置 sing-box v${{ env.SINGBOX_VERSION }}
          files: |
            artifacts/SingBox-Client-macos-arm64/*.dmg
            artifacts/SingBox-Client-windows-x64/*.zip
          draft: false
          prerelease: false

  upload-oss:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "ver=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "ver=latest" >> $GITHUB_OUTPUT
          fi

      - name: Upload to OSS
        uses: aliyun/ossutil-action@v2
        with:
          access-key-id: ${{ secrets.OSS_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          endpoint: ${{ secrets.OSS_ENDPOINT }}
          commands: |
            cp -r artifacts/SingBox-Client-macos-arm64/ oss://${{ secrets.OSS_BUCKET }}/singbox-client/${{ steps.version.outputs.ver }}/ --force
            cp -r artifacts/SingBox-Client-windows-x64/ oss://${{ secrets.OSS_BUCKET }}/singbox-client/${{ steps.version.outputs.ver }}/ --force
            cp -r artifacts/SingBox-Client-macos-arm64/ oss://${{ secrets.OSS_BUCKET }}/singbox-client/latest/ --force
            cp -r artifacts/SingBox-Client-windows-x64/ oss://${{ secrets.OSS_BUCKET }}/singbox-client/latest/ --force
