name: Build & Upload to OSS

on:
  push:
    tags:
      - 'v*'  # 推送 v1.0.0 这样的 tag 时触发
  workflow_dispatch:   # 支持手动触发

env:
  SINGBOX_VERSION: "1.11.4"  # sing-box 版本，按需更新

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14            # macOS ARM runner
            platform: macos-arm64
            singbox_url: https://github.com/SagerNet/sing-box/releases/download/v1.11.4/sing-box-1.11.4-darwin-arm64.tar.gz
            singbox_bin: sing-box
            artifact: "SingBox Client.app"
          - os: windows-latest      # Windows x64 runner
            platform: windows-x64
            singbox_url: https://github.com/SagerNet/sing-box/releases/download/v1.11.4/sing-box-1.11.4-windows-amd64.zip
            singbox_bin: sing-box.exe
            artifact: "SingBox Client.exe"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install PySide6 requests pyinstaller

      - name: Download sing-box (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p resources
          curl -L "${{ matrix.singbox_url }}" -o singbox.tar.gz
          tar xzf singbox.tar.gz
          cp sing-box-*/sing-box resources/sing-box
          chmod +x resources/sing-box

      - name: Download sing-box (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path resources
          Invoke-WebRequest -Uri "${{ matrix.singbox_url }}" -OutFile singbox.zip
          Expand-Archive -Path singbox.zip -DestinationPath singbox-extract
          Copy-Item "singbox-extract\sing-box-*\sing-box.exe" "resources\sing-box.exe"

      - name: Build with PyInstaller
        run: pyinstaller singbox-client.spec --noconfirm

      - name: Create DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          # 安装 create-dmg
          brew install create-dmg

          # 创建 DMG
          create-dmg \
            --volname "SingBox Client" \
            --volicon "resources/icon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "SingBox Client.app" 150 190 \
            --app-drop-link 450 190 \
            --no-internet-enable \
            "SingBox-Client-${{ matrix.platform }}.dmg" \
            "dist/SingBox Client.app" \
          || \
          # 如果没有 icon.icns，不带 --volicon 重试
          create-dmg \
            --volname "SingBox Client" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "SingBox Client.app" 150 190 \
            --app-drop-link 450 190 \
            --no-internet-enable \
            "SingBox-Client-${{ matrix.platform }}.dmg" \
            "dist/SingBox Client.app"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\SingBox Client.exe" -DestinationPath "SingBox-Client-${{ matrix.platform }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SingBox-Client-${{ matrix.platform }}
          path: |
            SingBox-Client-${{ matrix.platform }}.dmg
            SingBox-Client-${{ matrix.platform }}.zip

  upload-oss:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install ossutil
        run: |
          curl -L https://gosspublic.alicdn.com/ossutil/v2/2.0.3/ossutil-2.0.3-linux-amd64.zip -o ossutil.zip
          unzip ossutil.zip
          chmod +x ossutil-2.0.3-linux-amd64/ossutil
          sudo mv ossutil-2.0.3-linux-amd64/ossutil /usr/local/bin/ossutil

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "ver=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "ver=latest" >> $GITHUB_OUTPUT
          fi

      - name: Upload to OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          VER=${{ steps.version.outputs.ver }}

          # 上传各平台包（.dmg 和 .zip）
          for dir in artifacts/*/; do
            for file in "$dir"*; do
              [ -f "$file" ] || continue
              filename=$(basename "$file")
              echo "上传: $filename -> oss://${{ secrets.OSS_BUCKET }}/singbox-client/${VER}/${filename}"
              ossutil cp "$file" "oss://${{ secrets.OSS_BUCKET }}/singbox-client/${VER}/${filename}" \
                --access-key-id="${OSS_ACCESS_KEY_ID}" \
                --access-key-secret="${OSS_ACCESS_KEY_SECRET}" \
                --endpoint="${{ secrets.OSS_ENDPOINT }}" \
                --force
            done
          done

          # 同时更新 latest 目录
          if [ "$VER" != "latest" ]; then
            for dir in artifacts/*/; do
              for file in "$dir"*; do
                [ -f "$file" ] || continue
                filename=$(basename "$file")
                ossutil cp "$file" "oss://${{ secrets.OSS_BUCKET }}/singbox-client/latest/${filename}" \
                  --access-key-id="${OSS_ACCESS_KEY_ID}" \
                  --access-key-secret="${OSS_ACCESS_KEY_SECRET}" \
                  --endpoint="${{ secrets.OSS_ENDPOINT }}" \
                  --force
              done
            done
          fi

      - name: Summary
        run: |
          VER=${{ steps.version.outputs.ver }}
          echo "## 上传完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "OSS 路径:" >> $GITHUB_STEP_SUMMARY
          echo "- \`singbox-client/${VER}/SingBox-Client-macos-arm64.dmg\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`singbox-client/${VER}/SingBox-Client-windows-x64.zip\`" >> $GITHUB_STEP_SUMMARY
