name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            platform: macos-arm64
          - os: windows-latest
            platform: windows-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install PySide6 requests pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller singbox-client.spec --noconfirm

      - name: Create DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install create-dmg
          create-dmg \
            --volname "SingBox Client" \
            --volicon "resources/icon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "SingBox Client.app" 150 190 \
            --app-drop-link 450 190 \
            --no-internet-enable \
            "SingBox-Client-${{ matrix.platform }}.dmg" \
            "dist/SingBox Client.app" \
          || \
          create-dmg \
            --volname "SingBox Client" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "SingBox Client.app" 150 190 \
            --app-drop-link 450 190 \
            --no-internet-enable \
            "SingBox-Client-${{ matrix.platform }}.dmg" \
            "dist/SingBox Client.app"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\SingBox Client.exe" -DestinationPath "SingBox-Client-${{ matrix.platform }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SingBox-Client-${{ matrix.platform }}
          path: |
            SingBox-Client-${{ matrix.platform }}.dmg
            SingBox-Client-${{ matrix.platform }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SingBox Client ${{ github.ref_name }}
          body: |
            ## SingBox Client ${{ github.ref_name }}

            ### 下载
            - **macOS (Apple Silicon)**: `SingBox-Client-macos-arm64.dmg`
            - **Windows (x64)**: `SingBox-Client-windows-x64.zip`

            ### 使用前准备
            需要自行下载 [sing-box](https://github.com/SagerNet/sing-box/releases) 核心，在客户端设置中指定路径。

            ### macOS 安装说明
            1. 打开 DMG，将 SingBox Client 拖到 Applications
            2. 首次打开前执行：`xattr -cr /Applications/SingBox\ Client.app`
            3. 双击打开，在设置中指定 sing-box 路径

            ### Windows 安装说明
            1. 解压 zip
            2. 运行 `SingBox Client.exe`，在设置中指定 sing-box 路径
          files: |
            artifacts/SingBox-Client-macos-arm64/*.dmg
            artifacts/SingBox-Client-windows-x64/*.zip
          draft: false
          prerelease: false
