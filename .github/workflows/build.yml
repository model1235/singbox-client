name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  SINGBOX_VERSION: "1.12.12"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install PySide6 requests pyinstaller

      - name: Download sing-box
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path resources
          Invoke-WebRequest -Uri "https://github.com/SagerNet/sing-box/releases/download/v${{ env.SINGBOX_VERSION }}/sing-box-${{ env.SINGBOX_VERSION }}-windows-amd64.zip" -OutFile singbox.zip
          Expand-Archive -Path singbox.zip -DestinationPath singbox-extract
          Copy-Item "singbox-extract\sing-box-*\sing-box.exe" "resources\sing-box.exe"

      - name: Build with PyInstaller
        run: pyinstaller singbox-client.spec --noconfirm

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\SingBox Client.exe" -DestinationPath "SingBox-Client-windows-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SingBox-Client-windows-x64
          path: SingBox-Client-windows-x64.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SingBox Client ${{ github.ref_name }}
          body: |
            ## SingBox Client ${{ github.ref_name }}

            ### 下载
            - **Windows (x64)**: `SingBox-Client-windows-x64.zip`
            - **macOS (Apple Silicon)**: 本地构建，见下方说明

            ### Windows 安装
            1. 解压 zip
            2. 运行 `SingBox Client.exe`

            ---
            内置 sing-box v${{ env.SINGBOX_VERSION }}
          files: artifacts/SingBox-Client-windows-x64/*.zip
          draft: false
          prerelease: false

  upload-oss:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "ver=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "ver=latest" >> $GITHUB_OUTPUT
          fi

      - name: Upload to OSS
        uses: aliyun/ossutil-action@v2
        with:
          access-key-id: ${{ secrets.OSS_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          endpoint: ${{ secrets.OSS_ENDPOINT }}
          commands: |
            cp -r artifacts/SingBox-Client-windows-x64/ oss://${{ secrets.OSS_BUCKET }}/singbox-client/${{ steps.version.outputs.ver }}/ --force
            cp -r artifacts/SingBox-Client-windows-x64/ oss://${{ secrets.OSS_BUCKET }}/singbox-client/latest/ --force
