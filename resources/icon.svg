<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="box" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- 圆角背景 -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- 盾牌外形 -->
  <path d="M256 88 L400 148 L400 280 Q400 370 256 432 Q112 370 112 280 L112 148 Z"
        fill="none" stroke="url(#box)" stroke-width="16" stroke-linejoin="round" opacity="0.9"/>

  <!-- 内部网络节点 -->
  <!-- 中心节点 -->
  <circle cx="256" cy="240" r="24" fill="#e0e7ff"/>

  <!-- 上方节点 -->
  <circle cx="256" cy="156" r="16" fill="#c4b5fd"/>
  <line x1="256" y1="172" x2="256" y2="216" stroke="#c4b5fd" stroke-width="6" stroke-linecap="round"/>

  <!-- 左下节点 -->
  <circle cx="180" cy="320" r="16" fill="#c4b5fd"/>
  <line x1="192" y1="308" x2="240" y2="256" stroke="#c4b5fd" stroke-width="6" stroke-linecap="round"/>

  <!-- 右下节点 -->
  <circle cx="332" cy="320" r="16" fill="#c4b5fd"/>
  <line x1="320" y1="308" x2="272" y2="256" stroke="#c4b5fd" stroke-width="6" stroke-linecap="round"/>

  <!-- 左上节点 -->
  <circle cx="172" cy="200" r="12" fill="#a78bfa"/>
  <line x1="184" y1="208" x2="236" y2="232" stroke="#a78bfa" stroke-width="5" stroke-linecap="round"/>

  <!-- 右上节点 -->
  <circle cx="340" cy="200" r="12" fill="#a78bfa"/>
  <line x1="328" y1="208" x2="276" y2="232" stroke="#a78bfa" stroke-width="5" stroke-linecap="round"/>

  <!-- 中心高亮 -->
  <circle cx="256" cy="240" r="12" fill="#7c3aed"/>
</svg>
